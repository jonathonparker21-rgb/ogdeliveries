<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - OG Deliveries</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between">
      <h1 class="text-2xl font-bold">OG Deliveries Admin</h1>
      <a href="../index.html" class="text-green-600">← Back to Site</a>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto p-6">
    <h2 class="text-3xl font-bold mb-8">Current Orders (Oak Grove)</h2>
    <div class="bg-white rounded-3xl shadow overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-100">
          <tr>
            <th class="text-left p-4">Order #</th>
            <th class="text-left p-4">Customer</th>
            <th class="text-left p-4">From → To</th>
            <th class="text-left p-4">Item</th>
            <th class="text-left p-4">Status</th>
            <th class="text-left p-4">Action</th>
          </tr>
        </thead>
        <tbody id="ordersTable" class="divide-y"></tbody>
      </table>
    </div>
  </div>

  <script>
    // Demo orders
    const orders = [
      {id: "OG-1001", customer: "John Smith", route: "McDonalds → 123 Main St", item: "Food", status: "Picked Up"},
      {id: "OG-1002", customer: "Sarah Lee", route: "Flower Shop → 456 Oak St", item: "Flowers", status: "Out for Delivery"}
    ];

    function renderOrders() {
      const tbody = document.getElementById('ordersTable');
      tbody.innerHTML = orders.map(order => `
        <tr class="hover:bg-gray-50">
          <td class="p-4 font-medium">${order.id}</td>
          <td class="p-4">${order.customer}</td>
          <td class="p-4">${order.route}</td>
          <td class="p-4">${order.item}</td>
          <td class="p-4"><span class="px-3 py-1 rounded-full bg-blue-100 text-blue-700">${order.status}</span></td>
          <td class="p-4">
            <button onclick="updateStatus('${order.id}')" class="text-green-600 hover:underline">Update Status</button>
          </td>
        </tr>
      `).join('');
    }

    function updateStatus(id) {
      alert(`Status updated for ${id}. (In real version this would connect to database)`);
    }

    renderOrders();
  </script>
</body>
</html>
