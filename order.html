<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Order - OG Deliveries</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50">

  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-truck text-3xl text-green-600"></i>
        <h1 class="text-2xl font-bold">OG Deliveries</h1>
      </div>
      <div class="hidden md:flex space-x-8 text-gray-700">
        <a href="index.html">Home</a>
        <a href="order.html" class="text-green-600 font-medium">Place Order</a>
        <a href="track.html">Track</a>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-6 py-12">
    <h2 class="text-4xl font-bold mb-2 text-center">Place Your Delivery Order</h2>
    <p class="text-center text-gray-600 mb-10">Takes less than 2 minutes • Real-time tracking included</p>

    <form id="orderForm" class="bg-white shadow-2xl rounded-3xl p-10 space-y-8">
      <div>
        <h3 class="font-semibold text-lg mb-4 flex items-center gap-2"><i class="fa-solid fa-location-dot"></i> Pickup Address</h3>
        <input type="text" id="pickup" placeholder="123 Main St, City, State" class="w-full border border-gray-300 rounded-2xl px-6 py-4 focus:outline-none focus:border-green-500" required>
      </div>

      <div>
        <h3 class="font-semibold text-lg mb-4 flex items-center gap-2"><i class="fa-solid fa-flag-checkered"></i> Delivery Address</h3>
        <input type="text" id="delivery" placeholder="456 Oak Ave, City, State" class="w-full border border-gray-300 rounded-2xl px-6 py-4 focus:outline-none focus:border-green-500" required>
      </div>

      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium mb-2">Package Size</label>
          <select id="packageType" class="w-full border border-gray-300 rounded-2xl px-6 py-4">
            <option>Small (fits in backpack)</option>
            <option>Medium (up to 30 lbs)</option>
            <option>Large / Heavy</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Preferred Date</label>
          <input type="date" id="date" class="w-full border border-gray-300 rounded-2xl px-6 py-4">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium mb-2">Notes / Special Instructions</label>
        <textarea id="notes" rows="4" placeholder="Call when arriving, leave at door, fragile items..." class="w-full border border-gray-300 rounded-3xl px-6 py-4"></textarea>
      </div>

      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium mb-2">Your Name</label>
          <input type="text" id="name" class="w-full border border-gray-300 rounded-2xl px-6 py-4" required>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Phone Number</label>
          <input type="tel" id="phone" class="w-full border border-gray-300 rounded-2xl px-6 py-4" required>
        </div>
      </div>

      <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white text-xl font-semibold py-6 rounded-3xl transition-all">
        Submit Order & Get Tracking Number
      </button>
    </form>
  </div>

  <script>
    document.getElementById('orderForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const tracking = 'OG' + Math.floor(100000 + Math.random() * 900000);
      alert(`✅ Order placed successfully!\n\nYour tracking number is: ${tracking}\n\nYou can track it at track.html`);
      window.location.href = `track.html?tracking=${tracking}`;
    });
  </script>
</body>
</html>
