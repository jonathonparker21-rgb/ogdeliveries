<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Order - OG Deliveries</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50">

  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-car text-3xl text-green-600"></i>
        <div>
          <h1 class="text-2xl font-bold">OG Deliveries</h1>
          <p class="text-xs text-gray-500 -mt-1">Oak Grove, LA</p>
        </div>
      </div>
      <div class="space-x-8">
        <a href="index.html">Home</a>
        <a href="order.html" class="text-green-600 font-medium">Place Order</a>
        <a href="track.html">Track</a>
        <a href="admin/dashboard.html">Admin</a>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-6 py-12">
    <h2 class="text-4xl font-bold mb-2 text-center">Place Your Delivery Order</h2>
    <p class="text-center text-gray-600 mb-10">Oak Grove, LA • (318) 417-5750</p>

    <form id="orderForm" class="bg-white shadow-xl rounded-3xl p-10 space-y-8">
      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <h3 class="font-semibold mb-4">Pickup Location</h3>
          <input type="text" id="pickup" placeholder="Restaurant or pickup address" class="w-full border border-gray-300 rounded-xl px-5 py-4" required>
        </div>
        <div>
          <h3 class="font-semibold mb-4">Delivery Location</h3>
          <input type="text" id="delivery" placeholder="Delivery address in Oak Grove area" class="w-full border border-gray-300 rounded-xl px-5 py-4" required>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium mb-2">What are we delivering?</label>
        <select id="itemType" class="w-full border border-gray-300 rounded-xl px-5 py-4">
          <option value="food">Restaurant Food</option>
          <option value="flowers">Flowers</option>
          <option value="parts">Car Parts</option>
          <option value="coffee">Coffee / Drinks</option>
          <option value="alcohol">Alcohol (ID verification required)</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div id="alcoholWarning" class="hidden bg-yellow-100 border border-yellow-400 p-4 rounded-xl">
        <p class="text-yellow-800"><strong>Alcohol Delivery:</strong> Driver will verify ID at delivery. Must be 21+.</p>
      </div>

      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium mb-2">Your Name</label>
          <input type="text" id="name" class="w-full border border-gray-300 rounded-xl px-5 py-4" required>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Phone Number</label>
          <input type="tel" id="phone" value="3184175750" class="w-full border border-gray-300 rounded-xl px-5 py-4" required>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium mb-2">Special Instructions</label>
        <textarea id="notes" rows="4" class="w-full border border-gray-300 rounded-2xl px-5 py-4" placeholder="Leave at door, call when arriving..."></textarea>
      </div>

      <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white text-xl font-semibold py-6 rounded-2xl">Get Price Estimate & Submit Order</button>
    </form>
  </div>

  <script>
    // Alcohol warning
    document.getElementById('itemType').addEventListener('change', function() {
      document.getElementById('alcoholWarning').classList.toggle('hidden', this.value !== 'alcohol');
    });

    // Simple price estimator (demo)
    document.getElementById('orderForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Order received! Estimated fee: $12–$25 depending on distance.\n\nWe will call you shortly at (318) 417-5750 to confirm.');
      window.location.href = 'track.html';
    });
  </script>
</body>
</html>
